name: SimpleVoiceMechanics
version: '${project.version}'
main: de.tecca.simplevoicemechanics.SimpleVoiceMechanics
api-version: '1.21'
depend: [voicechat]
author: Tecca
description: Advanced voice detection mechanics for SimpleVoiceChat
website: https://github.com/T3CC4/SimpleVoiceMechanics

# Commands
commands:
  simplevoicemechanics:
    description: Main command for SimpleVoiceMechanics administration
    usage: /<command> [reload|toggle|status]
    aliases: [svm, voicemechanics, voicelistener, vl]
    permission: simplevoicemechanics.admin

# Permissions
permissions:
  simplevoicemechanics.*:
    description: Grants all SimpleVoiceMechanics permissions
    default: op
    children:
      simplevoicemechanics.admin: true
      simplevoicemechanics.bypass: true

  simplevoicemechanics.admin:
    description: Allows use of all admin commands
    default: op

  simplevoicemechanics.bypass:
    description: Prevents the player's voice from triggering SimpleVoiceMechanics reactions
    default: false

  voicelistener.*:
    description: Legacy alias for SimpleVoiceMechanics permissions
    default: op
    children:
      voicelistener.admin: true
      voicelistener.bypass: true
      simplevoicemechanics.admin: true
      simplevoicemechanics.bypass: true

  voicelistener.admin:
    description: Legacy alias for simplevoicemechanics.admin
    default: op
    children:
      simplevoicemechanics.admin: true

  voicelistener.bypass:
    description: Legacy alias for simplevoicemechanics.bypass
    default: false
    children:
      simplevoicemechanics.bypass: true
